<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>清明 · 追思</title>
  <style>
    :root {
      --bg-1: #0f171a;
      --bg-2: #152328;
      --mist: rgba(190, 218, 223, 0.1);
      --line: rgba(188, 214, 220, 0.26);
      --text-main: #d8e6e8;
      --text-soft: rgba(216, 230, 232, 0.72);
      --glow: rgba(177, 235, 247, 0.36);
      --accent: #9ec6ce;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", serif;
      color: var(--text-main);
      background: radial-gradient(circle at 30% 20%, #20343a 0%, var(--bg-2) 36%, var(--bg-1) 100%);
    }

    #rain-canvas, #petal-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #rain-canvas { z-index: 0; }
    #petal-canvas { z-index: 1; }

    .mist {
      position: fixed;
      inset: -10%;
      z-index: 2;
      background:
        radial-gradient(circle at 20% 30%, rgba(204, 231, 233, 0.13), transparent 48%),
        radial-gradient(circle at 80% 60%, rgba(200, 229, 235, 0.08), transparent 45%),
        radial-gradient(circle at 50% 80%, rgba(180, 222, 230, 0.06), transparent 42%);
      filter: blur(30px);
      opacity: 0.8;
      animation: fogMove 20s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes fogMove {
      from { transform: translate(-1%, -1%) scale(1.02); }
      to { transform: translate(1%, 1%) scale(1.07); }
    }

    .container {
      position: relative;
      z-index: 3;
      width: min(860px, 92vw);
      margin: 8vh auto 0;
      padding: 2.6rem 1.2rem 1.6rem;
      text-align: center;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: linear-gradient(145deg, rgba(19, 31, 35, 0.42), rgba(15, 23, 26, 0.15));
      backdrop-filter: blur(10px) saturate(120%);
      -webkit-backdrop-filter: blur(10px) saturate(120%);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35), inset 0 0 26px rgba(163, 208, 217, 0.08);
    }

    h1 {
      margin: 0;
      font-weight: 500;
      letter-spacing: 0.24em;
      font-size: clamp(1.6rem, 5vw, 2.6rem);
      text-shadow: 0 0 18px rgba(200, 235, 240, 0.2);
    }

    .verse {
      margin: 1.2rem auto 0;
      max-width: 30em;
      color: var(--text-soft);
      font-size: clamp(0.95rem, 2.8vw, 1.1rem);
      letter-spacing: 0.18em;
      opacity: 0;
      animation: verseFade 6s ease-in-out infinite;
      white-space: nowrap;
      overflow: hidden;
    }

    @keyframes verseFade {
      0%, 100% { opacity: 0.12; filter: blur(1px); }
      50% { opacity: 0.88; filter: blur(0); }
    }

    .composer {
      width: min(760px, 92vw);
      margin: 4.2vh auto 0;
      padding: 1rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.7rem;
      border-radius: 16px;
      background: rgba(14, 24, 28, 0.42);
      border: 1px solid rgba(196, 224, 231, 0.18);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: relative;
      z-index: 4;
    }

    input[type="text"] {
      width: 100%;
      border: 1px solid rgba(203, 230, 235, 0.34);
      border-radius: 12px;
      background: rgba(8, 14, 17, 0.28);
      color: var(--text-main);
      padding: 0.8rem 0.95rem;
      font-size: 1rem;
      outline: none;
      transition: box-shadow 0.25s ease, border-color 0.25s ease;
    }

    input[type="text"]::placeholder {
      color: rgba(204, 224, 228, 0.52);
      letter-spacing: 0.08em;
    }

    input[type="text"]:focus {
      border-color: rgba(189, 236, 247, 0.7);
      box-shadow: 0 0 0 2px rgba(145, 201, 214, 0.16), 0 0 22px rgba(156, 209, 224, 0.35);
    }

    .send-btn {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      border: 1px solid rgba(191, 232, 242, 0.45);
      background: linear-gradient(180deg, rgba(156, 199, 209, 0.35), rgba(121, 167, 178, 0.25));
      color: #e4f1f3;
      border-radius: 12px;
      padding: 0.78rem 1rem;
      min-width: 6.2rem;
      font-size: 0.95rem;
      letter-spacing: 0.14em;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .send-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 18px rgba(109, 151, 159, 0.35); }
    .send-btn:active { transform: translateY(1px) scale(0.99); }

    .ripple {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      animation: ripple 700ms ease-out;
      background: radial-gradient(circle, rgba(222, 247, 252, 0.4) 0%, rgba(222, 247, 252, 0.16) 45%, transparent 70%);
      pointer-events: none;
      width: 20px;
      height: 20px;
      z-index: -1;
    }

    @keyframes ripple { to { transform: scale(18); opacity: 0; } }

    #message-layer {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      overflow: hidden;
    }

    .spirit-text {
      position: absolute;
      left: 50%;
      bottom: 16vh;
      transform: translateX(-50%);
      color: rgba(230, 241, 243, 0.84);
      text-shadow: 0 0 12px rgba(216, 240, 245, 0.35), 0 0 28px rgba(190, 222, 231, 0.2);
      letter-spacing: 0.08em;
      max-width: min(84vw, 40rem);
      line-height: 1.6;
      text-align: center;
      font-size: clamp(1rem, 3vw, 1.3rem);
      animation: spiritRise 8.2s ease-out forwards;
      filter: blur(0.2px);
      white-space: pre-wrap;
      word-break: break-word;
    }

    @keyframes spiritRise {
      0%   { transform: translate(-50%, 0) scale(0.98); opacity: 0; filter: blur(2px); }
      12%  { opacity: 0.95; filter: blur(0.2px); }
      55%  { opacity: 0.72; }
      100% { transform: translate(-50%, -56vh) scale(1.03); opacity: 0; filter: blur(6px); }
    }

    .hint {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: rgba(211, 229, 233, 0.56);
      letter-spacing: 0.12em;
    }

    @media (max-width: 640px) {
      .container { margin-top: 10vh; padding-top: 2rem; }
      .verse { white-space: normal; line-height: 1.8; }
      .composer { grid-template-columns: 1fr; }
      .send-btn { width: 100%; }
      .spirit-text { bottom: 20vh; }
    }
  </style>
</head>
<body>
  <canvas id="rain-canvas" aria-hidden="true"></canvas>
  <canvas id="petal-canvas" aria-hidden="true"></canvas>
  <div class="mist" aria-hidden="true"></div>

  <main class="container">
    <h1>清明 · 追思</h1>
    <p class="verse">清明时节雨纷纷，路上行人欲断魂。</p>
    <p class="hint">将思念写下，让风雨代为传达。</p>
  </main>

  <section class="composer" aria-label="寄语输入区">
    <input id="msgInput" type="text" maxlength="80" placeholder="写下你想对祖先说的话……" />
    <button id="sendBtn" class="send-btn" type="button">寄 语</button>
  </section>

  <div id="message-layer" aria-live="polite"></div>

  <!-- 可选：若有雨声音频，可取消注释并替换路径 -->
  <!-- <audio id="rainAudio" src="rain.mp3" loop autoplay></audio> -->

  <script>
    (() => {
      const rainCanvas = document.getElementById('rain-canvas');
      const rainCtx = rainCanvas.getContext('2d');
      const petalCanvas = document.getElementById('petal-canvas');
      const petalCtx = petalCanvas.getContext('2d');

      const messageLayer = document.getElementById('message-layer');
      const input = document.getElementById('msgInput');
      const sendBtn = document.getElementById('sendBtn');

      let w = 0;
      let h = 0;
      let dpr = Math.min(window.devicePixelRatio || 1, 2);

      const rainDrops = [];
      const rainCountBase = 180;
      const petals = [];
      const petalCount = 14;

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        w = window.innerWidth;
        h = window.innerHeight;

        [rainCanvas, petalCanvas].forEach((canvas) => {
          canvas.width = Math.floor(w * dpr);
          canvas.height = Math.floor(h * dpr);
          canvas.style.width = `${w}px`;
          canvas.style.height = `${h}px`;
        });

        rainCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        petalCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

        initRain();
        initPetals();
      }

      function initRain() {
        rainDrops.length = 0;
        const count = Math.floor(rainCountBase * Math.max(0.7, Math.min(1.35, w / 1200)));
        for (let i = 0; i < count; i++) {
          rainDrops.push(createDrop(Math.random() * w, Math.random() * h));
        }
      }

      function createDrop(x, y) {
        const len = 10 + Math.random() * 16;
        const speed = 2.2 + Math.random() * 3.8;
        return {
          x,
          y,
          len,
          speed,
          sway: (Math.random() - 0.5) * 0.45,
          thickness: 0.6 + Math.random() * 1.2,
          alpha: 0.16 + Math.random() * 0.35
        };
      }

      function initPetals() {
        petals.length = 0;
        for (let i = 0; i < petalCount; i++) {
          petals.push({
            x: Math.random() * w,
            y: Math.random() * h,
            size: 3 + Math.random() * 7,
            speedY: 0.25 + Math.random() * 0.8,
            speedX: (Math.random() - 0.5) * 0.5,
            rot: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 0.01,
            alpha: 0.05 + Math.random() * 0.1
          });
        }
      }

      function drawRain() {
        rainCtx.clearRect(0, 0, w, h);
        for (const d of rainDrops) {
          rainCtx.beginPath();
          rainCtx.lineWidth = d.thickness;
          rainCtx.strokeStyle = `rgba(188, 224, 232, ${d.alpha})`;
          rainCtx.moveTo(d.x, d.y);
          rainCtx.lineTo(d.x + d.sway * d.len, d.y + d.len);
          rainCtx.stroke();

          d.x += d.sway;
          d.y += d.speed;

          if (d.y > h + d.len || d.x < -30 || d.x > w + 30) {
            d.x = Math.random() * w;
            d.y = -20 - Math.random() * h * 0.25;
          }
        }
      }

      function drawPetals() {
        petalCtx.clearRect(0, 0, w, h);
        for (const p of petals) {
          petalCtx.save();
          petalCtx.globalAlpha = p.alpha;
          petalCtx.translate(p.x, p.y);
          petalCtx.rotate(p.rot);
          petalCtx.fillStyle = 'rgba(194, 213, 216, 0.9)';

          petalCtx.beginPath();
          petalCtx.ellipse(0, 0, p.size, p.size * 0.55, 0, 0, Math.PI * 2);
          petalCtx.fill();
          petalCtx.restore();

          p.x += p.speedX + Math.sin((p.y + p.rot) * 0.01) * 0.2;
          p.y += p.speedY;
          p.rot += p.rotSpeed;

          if (p.y > h + 20) {
            p.y = -10;
            p.x = Math.random() * w;
          }
          if (p.x < -30) p.x = w + 20;
          if (p.x > w + 30) p.x = -20;
        }
      }

      function animate() {
        drawRain();
        drawPetals();
        requestAnimationFrame(animate);
      }

      function createSpirit(text) {
        const spirit = document.createElement('p');
        spirit.className = 'spirit-text';
        spirit.textContent = text.trim();
        spirit.style.left = `${46 + Math.random() * 8}%`;
        spirit.style.animationDuration = `${7 + Math.random() * 3}s`;
        messageLayer.appendChild(spirit);

        spirit.addEventListener('animationend', () => spirit.remove(), { once: true });
      }

      function addRipple(event) {
        const rect = sendBtn.getBoundingClientRect();
        const ripple = document.createElement('span');
        ripple.className = 'ripple';
        const x = (event?.clientX ?? rect.left + rect.width / 2) - rect.left;
        const y = (event?.clientY ?? rect.top + rect.height / 2) - rect.top;
        ripple.style.left = `${x}px`;
        ripple.style.top = `${y}px`;
        sendBtn.appendChild(ripple);
        ripple.addEventListener('animationend', () => ripple.remove(), { once: true });
      }

      function submitMessage(e) {
        addRipple(e);
        const value = input.value.trim();
        if (!value) {
          input.focus();
          return;
        }
        createSpirit(value);
        input.value = '';
      }

      sendBtn.addEventListener('click', submitMessage);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') submitMessage(e);
      });

      window.addEventListener('resize', resize, { passive: true });
      resize();
      requestAnimationFrame(animate);
    })();
  </script>
</body>
</html>
